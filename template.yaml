AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: DynamoDB CRUD Lambda Functions

Globals:
  Function:
    Timeout: 30
    Runtime: nodejs20.x
    Environment:
      Variables:
        TABLE_NAME: Users
        DYNAMODB_ENDPOINT: http://dynamodb-local:8000
    Architectures:
      - x86_64

Resources:
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: email
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: EmailIndex
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  CreateUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: handlers/
      Handler: create.handler
      Events:
        CreateUser:
          Type: Api
          Properties:
            Path: /users
            Method: post
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable

  GetUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: handlers/
      Handler: get.handler
      Events:
        GetUser:
          Type: Api
          Properties:
            Path: /users/{id}
            Method: get
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable

  ListUsersFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: handlers/
      Handler: list.handler
      Events:
        ListUsers:
          Type: Api
          Properties:
            Path: /users
            Method: get
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable

  UpdateUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: handlers/
      Handler: update.handler
      Events:
        UpdateUser:
          Type: Api
          Properties:
            Path: /users/{id}
            Method: patch
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable

  DeleteUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: handlers/
      Handler: delete.handler
      Events:
        DeleteUser:
          Type: Api
          Properties:
            Path: /users/{id}
            Method: delete
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
  
  UsersTableName:
    Description: DynamoDB Users table name
    Value: !Ref UsersTable
